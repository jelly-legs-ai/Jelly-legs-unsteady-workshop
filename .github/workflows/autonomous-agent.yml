name: Autonomous AI Team

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Autonomous Orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/autonomous-orchestrator.js
        
      - name: Commit and push changes
        run: |
          git config --local user.email "jelly-legs@autonomous.ai"
          git config --local user.name "Jelly-Legs AI"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Autonomous update - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" && git push)
