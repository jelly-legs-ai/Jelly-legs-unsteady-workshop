name: Auto Merge PRs

on:
  pull_request:
    types: [opened, synchronize]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'jelly-legs-ai' || contains(github.event.pull_request.title, '🤖') || contains(github.event.pull_request.title, 'Agent')
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Auto-merge if checks pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Checking PR #$PR_NUMBER"
          
          # Wait for checks to complete
          sleep 30
          
          # Check if PR is mergeable
          gh pr view $PR_NUMBER --json mergeStateStatus,mergeable --jq '.mergeStateStatus' | grep -q "CLEAN" && \
          gh pr merge $PR_NUMBER --squash --delete-branch --auto || \
          echo "PR not ready for merge yet"
