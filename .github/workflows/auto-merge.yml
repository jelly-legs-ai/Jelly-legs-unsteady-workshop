name: Auto Merge PRs

on:
  pull_request:
    types: [opened, synchronize]
  workflow_run:
    workflows: ["AI Team - Real Work"]
    types: [completed]
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Auto-merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking for mergeable PRs..."
          
          # Find open PRs from jelly-legs-ai or with agent emoji in title
          gh pr list --repo ${{ github.repository }} --state open --json number,title,author,mergeStateStatus,statusCheckRollup --jq '.[] | select(.author.login == "jelly-legs-ai" or (.title | contains("🔬") or contains("🎨") or contains("💻") or contains("👁️") or contains("⚙️") or contains("🛡️") or contains("🚀"))) | {number: .number, title: .title, status: .mergeStateStatus, checks: .statusCheckRollup.state}' | jq -c '.' | while read pr; do
            NUMBER=$(echo $pr | jq -r '.number')
            TITLE=$(echo $pr | jq -r '.title')
            STATUS=$(echo $pr | jq -r '.status')
            CHECKS=$(echo $pr | jq -r '.checks')
            
            echo "PR #$NUMBER: $TITLE"
            echo "  Merge status: $STATUS, Checks: $CHECKS"
            
            # Merge if clean and checks pass (or no checks required)
            if [ "$STATUS" = "CLEAN" ] && ([ "$CHECKS" = "SUCCESS" ] || [ "$CHECKS" = "null" ]); then
              echo "  → Auto-merging PR #$NUMBER"
              gh pr merge $NUMBER --squash --delete-branch --repo ${{ github.repository }} || echo "  → Merge failed, may need manual review"
            else
              echo "  → Not ready for merge (status: $STATUS, checks: $CHECKS)"
            fi
          done
